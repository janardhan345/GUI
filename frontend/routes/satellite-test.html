<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GUI - Satellite Test</title>
  <script src="https://unpkg.com/three@0.145.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.145.0/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://unpkg.com/three@0.145.0/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" type="image/x-icon" href="../assets/GUI.svg">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">TEAM INVINCIBLE</span>
        <button id="sidebarCollapseBtn" class="collapse-btn"><</button>
      </div>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html"><span class="nav-icon"><img src="../assets/home.svg" alt="home"/></span><span class="nav-label">Home</span></a>
        <a class="nav-item" href="gyro.html"><span class="nav-icon"><img src="../assets/gyro.svg" alt="gyro"/></span><span class="nav-label">Gyro</span></a>
        <a class="nav-item" href="satellite-test.html"><span class="nav-icon"><img src="../assets/GUI.svg" alt="satellite"/></span><span class="nav-label">Satellite Test</span></a>
      </nav>
    </aside>

    <main class="content-wrap">
      <div class="top-strip"><div class="row"><div>Satellite Test</div></div></div>
      <section class="dashboard-border card">
        <div id="satellite3d" style="height: 520px; background: #000;"></div>
        <div style="margin-top: 12px; display: flex; gap: 8px;">
          <button id="resetBtn" class="collapse-btn" style="width: auto; padding: 0 10px;">Reset View</button>
          <button id="wireBtn" class="collapse-btn" style="width: auto; padding: 0 10px;">Toggle Wireframe</button>
        </div>
      </section>
    </main>
  </div>

  <script src="../JS/sidebar.js"></script>
  <script src="../JS/threejs-sat.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.SimpleGUISidebar) {
        window.SimpleGUISidebar.initSidebar();
      }
      var viz = new SatelliteVisualization('satellite3d');
      var resetBtn = document.getElementById('resetBtn');
      var wireBtn = document.getElementById('wireBtn');

      resetBtn.addEventListener('click', function () {
        viz.resetView();
      });

      wireBtn.addEventListener('click', function () {
        viz.toggleWireframe();
      });
    });
  </script>
</body>
</html>
