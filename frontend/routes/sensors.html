<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUI-sensors</title>
  <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-streaming@2.0.0/dist/chartjs-plugin-streaming.min.js"></script>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" type="image/x-icon" href="../assets/GUI.svg">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">TEAM INVINCIBLE</span>
        <button id="sidebarCollapseBtn" class="collapse-btn"><</button>
      </div>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html"><span class="nav-icon"><img src="../assets/home.svg" alt="home"/></span><span class="nav-label">Home</span></a>
        <a class="nav-item" href="sensors.html"><span class="nav-icon"><img src="../assets/sensor.svg" alt="sensors"/></span><span class="nav-label">Sensors</span></a>
        <a class="nav-item" href="gps.html"><span class="nav-icon"><img src="../assets/GPS.svg" alt="gps"/></span><span class="nav-label">GPS</span></a>
        <a class="nav-item" href="gyro.html"><span class="nav-icon"><img src="../assets/gyro.svg" alt="gyro"/></span><span class="nav-label">Gyro</span></a>
        <a class="nav-item" href="communication.html"><span class="nav-icon"><img src="../assets/comms.svg" alt="communication"/></span><span class="nav-label">Communication</span></a>
      </nav>
    </aside>

    <main class="content-wrap">
      <div class="top-strip"><div class="row"><div>Sensors Route</div></div></div>
      <div class="grid grid-3">
        <section class="dashboard-border card"><h3>Temperature</h3><div class="canvas-box"><canvas id="temperatureChart"></canvas></div><div id="temperatureDisplay" class="digital-display">-- °C</div></section>
        <section class="dashboard-border card"><h3>Pressure</h3><div class="canvas-box"><canvas id="pressureChart"></canvas></div><div id="pressureDisplay" class="digital-display">-- hPa</div></section>
        <section class="dashboard-border card"><h3>Humidity</h3><div class="canvas-box"><canvas id="humidityChart"></canvas></div><div id="humidityDisplay" class="digital-display">-- %</div></section>
        <section class="dashboard-border card"><h3>Altitude</h3><div class="canvas-box"><canvas id="altitudeChart"></canvas></div><div id="altitudeDisplay" class="digital-display">-- m</div></section>
        <section class="dashboard-border card"><h3>Battery Voltage</h3><div class="canvas-box"><canvas id="batteryVoltageChart"></canvas></div><div id="voltageDisplay" class="digital-display">-- V</div></section>
        <section class="dashboard-border card"><h3>Gas Resistance</h3><div class="metric"><span id="gasResistance">--</span> Ω</div></section>
      </div>
    </main>
  </div>

  <script src="../JS/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.SimpleGUISidebar) {
        window.SimpleGUISidebar.initSidebar();
      }
    });
  </script>
  <script src="../JS/chart.js"></script>
  <script src="../JS/telemetry_update-ui.js"></script>
  <script src="../JS/socket.js"></script>
</body>
</html>
