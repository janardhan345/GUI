<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GUI - Gyro</title>
  <script src="../node_modules/socket.io-client/dist/socket.io.min.js"></script>
  <script src="../node_modules/chart.js/dist/chart.min.js"></script>
  <script src="../node_modules/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="../node_modules/chartjs-plugin-streaming/dist/chartjs-plugin-streaming.min.js"></script>
  <script src="../node_modules/three/build/three.min.js"></script>
  <script src="../node_modules/three/examples/js/loaders/OBJLoader.js"></script>
  <script src="../node_modules/three/examples/js/controls/OrbitControls.js"></script>
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="icon" type="image/x-icon" href="../assets/GUI.svg">
</head>
<body>
  <div class="app-shell">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-head">
        <span class="sidebar-title">TEAM INVINCIBLE</span>
        <button id="sidebarCollapseBtn" class="collapse-btn"><</button>
      </div>
      <nav class="nav-list">
        <a class="nav-item" href="../index.html"><span class="nav-icon"></span><span class="nav-label">Home</span></a>
        <a class="nav-item" href="sensors.html"><span class="nav-icon"></span><span class="nav-label">Sensors</span></a>
        <a class="nav-item" href="gps.html"><span class="nav-icon"></span><span class="nav-label">GPS</span></a>
        <a class="nav-item" href="gyro.html"><span class="nav-icon"></span><span class="nav-label">Gyro</span></a>
        <a class="nav-item" href="communication.html"><span class="nav-icon"></span><span class="nav-label">Communication</span></a>
      </nav>
    </aside>

    <main class="content-wrap">
      <div class="top-strip"><div class="row"><div>Gyro Route</div></div></div>
      <div class="grid grid-2">
        <section class="dashboard-border card">
          <h3>3D Satellite</h3>
          <div id="satellite3d" style="height: 360px; background: #000;"></div>
          <div class="digital-display">Roll: <span id="rollDisplay">0.0°</span></div>
          <div class="digital-display">Pitch: <span id="pitchDisplay">0.0°</span></div>
          <div class="digital-display">Yaw: <span id="yawDisplay">0.0°</span></div>
          <div class="digital-display">Motion: <span id="motionIntensity">STABLE</span></div>
          <div style="margin-top: 8px; display: flex; gap: 8px;">
            <button id="resetViewBtn" class="collapse-btn" style="width: auto; padding: 0 10px;">Reset View</button>
            <button id="wireframeBtn" class="collapse-btn" style="width: auto; padding: 0 10px;">Toggle Wireframe</button>
          </div>
        </section>

        <section class="dashboard-border card">
          <h3>Accelerometer</h3>
          <div class="canvas-box"><canvas id="accelChart"></canvas></div>
          <div class="digital-display" id="accelDisplay">--</div>
        </section>

        <section class="dashboard-border card">
          <h3>Gyroscope</h3>
          <div class="canvas-box"><canvas id="gyroChart"></canvas></div>
          <div class="digital-display" id="gyroDisplay">--</div>
        </section>

        <section class="dashboard-border card">
          <h3>Magnetometer</h3>
          <div class="canvas-box"><canvas id="magChart"></canvas></div>
          <div class="digital-display" id="magDisplay">--</div>
        </section>
      </div>
    </main>
  </div>

  <script src="../JS/sidebar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (window.SimpleGUISidebar) {
        window.SimpleGUISidebar.initSidebar();
      }
    });
  </script>
  <script src="../JS/chart.js"></script>
  <script src="../JS/threejs-sat.js"></script>
  <script src="../JS/orientation.js"></script>
  <script src="../JS/telemetry_update-ui.js"></script>
  <script src="../JS/socket.js"></script>
</body>
</html>
